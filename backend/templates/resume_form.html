<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Resume - AI Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">AI Resume Builder</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="resume-form">
            <h2 class="form-title">Create Your Resume</h2>
            
            <div id="alert-container"></div>
            
            <form method="POST" action="/create-resume" enctype="multipart/form-data" id="resume-form">
                <!-- Profile Photo -->
                <div class="photo-upload">
                    <h3 class="section-title">Profile Photo</h3>
                    <div class="photo-preview" id="photo-preview" style="display: none;">
                        <img id="photo-preview-img" src="" alt="Profile Preview">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Upload Passport Size Photo</label>
                        <input type="file" class="form-control" name="profile_image" id="profile_image" accept="image/*">
                        <small class="text-muted">Max size: 5MB. Supported: JPG, PNG, GIF</small>
                    </div>
                </div>

                <!-- Personal Information -->
                <h3 class="section-title">Personal Information</h3>
                
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" class="form-control" name="full_name" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-control" name="email" value="{{ current_user.email }}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Phone Number *</label>
                            <input type="tel" class="form-control" name="phone" value="{{ current_user.phone }}" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">LinkedIn Profile</label>
                            <input type="url" class="form-control" name="linkedin" placeholder="https://linkedin.com/in/username">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">Portfolio Website</label>
                            <input type="url" class="form-control" name="portfolio" placeholder="https://yourportfolio.com">
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Professional Title *</label>
                    <input type="text" class="form-control" name="professional_title" placeholder="e.g., Software Engineer" required>
                </div>

                <!-- Job Target -->
                <h3 class="section-title">Job Target</h3>
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="form-label">Target Job Role *</label>
                            <input type="text" class="form-control" name="job_role" placeholder="e.g., Data Scientist" required onchange="suggestSkills()">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="form-label">Experience Level *</label>
                            <select class="form-control" name="experience_level" id="experience_level" required>
                                <option value="fresher">Fresher</option>
                                <option value="experienced">Experienced</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label class="form-label">Resume Tone *</label>
                            <select class="form-control" name="resume_tone" required>
                                <option value="professional">Professional</option>
                                <option value="technical">Technical</option>
                                <option value="modern">Modern</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Skill Suggestions -->
                <div id="skill-suggestions"></div>

                <!-- Education -->
                <h3 class="section-title">Education</h3>
                <div id="education-container">
                    <div class="education-entry">
                        <div class="row">
                            <div class="col-md-3">
                                <input type="text" class="form-control" name="degree[]" placeholder="Degree">
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control" name="institution[]" placeholder="Institution">
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control" name="graduation_year[]" placeholder="Year">
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control" name="cgpa[]" placeholder="CGPA/%">
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-sm btn-danger remove-entry">Remove</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary btn-sm" id="add-education">Add Education</button>

                <!-- Experience (for experienced) -->
                <div id="experience-section" style="display: none;">
                    <h3 class="section-title">Work Experience</h3>
                    <div id="experience-container"></div>
                    <button type="button" class="btn btn-secondary btn-sm" id="add-experience">Add Experience</button>
                </div>

                <!-- Projects -->
                <h3 class="section-title">Projects</h3>
                <div id="projects-container">
                    <div class="project-entry">
                        <div class="row">
                            <div class="col-md-3">
                                <input type="text" class="form-control" name="project_title[]" placeholder="Project Title">
                            </div>
                            <div class="col-md-5">
                                <textarea class="form-control" name="project_description[]" placeholder="Description" rows="2"></textarea>
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control" name="project_technologies[]" placeholder="Technologies">
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-sm btn-danger remove-entry">Remove</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary btn-sm" id="add-project">Add Project</button>

                <!-- Skills -->
                <h3 class="section-title">Skills</h3>
                
                <div class="form-group">
                    <label class="form-label">Technical Skills</label>
                    <input type="text" class="form-control" name="technical_skills[]" id="technical_skills" placeholder="e.g., Python, JavaScript, SQL">
                    <small class="text-muted">Separate with commas</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Soft Skills</label>
                    <input type="text" class="form-control" name="soft_skills[]" placeholder="e.g., Communication, Leadership">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Tools & Technologies</label>
                    <input type="text" class="form-control" name="tools[]" placeholder="e.g., Git, Docker, AWS">
                </div>

                <!-- Additional Sections -->
                <h3 class="section-title">Additional Information</h3>
                
                <div class="form-group">
                    <label class="form-label">Certifications</label>
                    <textarea class="form-control" name="certifications" rows="3" placeholder="List your certifications"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Languages</label>
                    <input type="text" class="form-control" name="languages" placeholder="e.g., English, Spanish, French">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Achievements</label>
                    <textarea class="form-control" name="achievements" rows="3" placeholder="List your achievements"></textarea>
                </div>

                <!-- Submit -->
                <div class="form-group text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Generate Resume</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="static/app.js"></script>
</body>
</html>
