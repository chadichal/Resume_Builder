<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - AI Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">AI Resume Builder</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="form-title">Verify Your Account</h2>
            <p class="text-center">We've sent OTPs to your email and phone</p>
            
            <div id="alert-container"></div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-warning">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="/verify-otp">
                <div class="form-group">
                    <label class="form-label">Email OTP</label>
                    <input type="text" class="form-control" name="email_otp" required maxlength="6" pattern="\d{6}">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Phone OTP</label>
                    <input type="text" class="form-control" name="phone_otp" required maxlength="6" pattern="\d{6}">
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary w-100">Verify</button>
                </div>
                
                <div class="text-center">
                    <button type="button" class="btn btn-link" id="resend-email-otp">Resend Email OTP</button>
                    <button type="button" class="btn btn-link" id="resend-phone-otp">Resend Phone OTP</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#resend-email-otp').click(function() {
            $.ajax({
                url: '/resend-otp',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ type: 'email' }),
                success: function(response) {
                    if (response.success) {
                        showAlert('Email OTP resent!', 'success');
                    }
                }
            });
        });
        
        $('#resend-phone-otp').click(function() {
            $.ajax({
                url: '/resend-otp',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ type: 'phone' }),
                success: function(response) {
                    if (response.success) {
                        showAlert('Phone OTP resent!', 'success');
                    }
                }
            });
        });
    </script>
</body>
</html>
